<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

      

    
</head>

<body>
    <div class="header">
        <div class="logo">
            KoreaNirsa
        </div>

        <div class="header-right">
            <span>admin@example.com</span>
            <button class="logout-btn">로그아웃</button>
        </div>
    </div>

    <div class="main">

        <div class="sidebar">
            <button class="sidebar-btn">회원목록</button>
        </div>

        <!-- 컨텐츠 -->
        <div class="content">

            <div class="detail-card">

                <h3>회원 상세</h3>

                <div class="detail-row">
                    <span class="label">ID</span>
                    <span class="value">1</span>
                </div>

                <div class="detail-row">
                    <span class="label">이름</span>
                    <span class="value">홍길동</span>
                </div>

                <div class="detail-row">
                    <span class="label">이메일</span>
                    <span class="value">hong@example.com</span>
                </div>

                <div class="detail-row">
                    <span class="label">전화번호</span>
                    <span class="value">010-1234-5678</span>
                </div>

                <button class="list-btn" onclick="goList()">목록으로</button>

            </div>

        </div>

    </div>

    <script src="user-detail.js"></script>
    
</body>

</html>
