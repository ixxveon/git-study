<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        console.log("Hello, World!");

        setTimeout(() => {
            console.log("Async!!!");
        }, 3000)

        console.log("go");
    </script>

    <script>
        // 콜백 함수
        function getUserData(callback) {
            setTimeout(() => {
                const userData = {name : "홍길동", age : 25};
                callback(userData);
            }, 1000)
        }

        getUserData(function(data) {
            console.log(data);
        })
    </script>

    <script>
        function printMessage(message, callback) {
            callback(message);
        }

        printMessage("Hello, JavaScript!", (message) => {
            console.log(message);
        })
    </script>

    <SCript>
        function addAndCallback(num1, num2, callback) {
            callback(num1, num2);
        }

        addAndCallback(1, 5, (num1, num2) => {
            console.log("덧셈 결과: " + parseInt(num1 + num2)); 
        })
    </SCript>

    <script>
        // 프로미스(Promise)
        // - 콜백 지옥을 해결하기 위해 등장한 비동기 처리를 위한 객체

        // 프로미스 메서드
        // - resolve: 작업 성공 시
        // - reject: 작업 실패 시

        // 프로미스 상태
        // - pending: 작업이 완료되지 않은 상태 (대기 상태)
        // - fulfilled: 작업이 성공적으로 완료된 상태 (완료 상태)
        // - rejected: 작업이 실패한 상태 (실패 상태)
        function getUser() {
            return new Promise((resolve, reject) => {
                const user = {name : "홍길동", age : 22};
                // resolve(user); // 작업 성공 시 user 객체를 넘겨주겠다.
                reject("작업 실패!!!");
            })
        }

        getUser()
            .then((data) => { // 작업 성공 시(resolve 호출 시 실행되는 영역)
                console.log(data);
            })
            .catch((errorMsg) => {
                console.error(errorMsg);
            })
            
    </script>

    <script>
        function getUserData2() {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    const userData = {name : "첫번째 데이터", num : 1};
                    resolve(userData);
                }, 3000);
            })
        }
        
        function getUserData3() {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    const userData = {name : "두번째 데이터", num : 1};
                    resolve(userData);
                }, 1000);
            })
        }
        
        function getUserData4() {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    const userData = {name : "세번째 데이터", num : 1};
                    resolve(userData);
                }, 2000);
            })
        }  
        
        async function fetchUserData() {
            try {
                console.log("async/await 시작")
                // 1. getUserData2() 호출
                const result1 = await getUserData2();
                console.log(result1.name);

                // 2. 1번 호출이 끝나면 getUserData3() 호출
                const result2 = await getUserData3();
                console.log(result2.name);

                // 3. 2번 호출이 끝나면 getUserData4() 호출
                const result3 = await getUserData4();
                console.log(result3.name);

            } catch(error) {
                console.error(error);
            }
        }

        fetchUserData();

        getUserData2()
            .then((data) => {
                console.log(data);
                return getUserData3();
            })
            .then((data) => { // 메서드 체이닝
                console.log(data);
                return getUserData4();
            })
            .then((data) => {
                console.log(data);
            })
            .catch((error) => {
                console.error(error);
            })
    </script>

    <script>
        function laterMessage() {
            // 1. 프로미스 생성
            // 2. 5초 뒤 실행되도록 setTimeout 코드 작성
            // 3. setTimeout 안에 성공시키며 "성공했습니다!" 메시지 전달
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    resolve("성공했습니다!");
                }, 5000)
            })
        }

        laterMessage()
            .then((message) => console.log(message))
            .catch((error) => console.error(error));
    </script>

    <script>
        function addNumbers(num1, num2) {
            // 1. 프로미스 생성
            // 2. 입력값이 숫자인지 판별
            // -> if문에서 typeof num1 === "number" 처럼 조건을 걸어 판별 가능
            // 3. 두 개의 값이 숫자가 맞다면 '더한 값'을 전달하며 성공(resolve)으로 반환
            // 4. 두 개의 값 중 하나라도 숫자가 아니라면 '숫자를 입력해주세요.'
            // 메시지를 전달하며 실패(reject)로 반환
            return new Promise((resolve, reject) => {
                if(typeof num1 === "number" && typeof num2 === "number") {
                    result = num1 + num2;
                    resolve(result);
                } else {
                    reject("숫자를 입력해주세요.");
                }
            })
        }

        addNumbers(13, 16) 
            .then((result) => console.log("덧셈 결과: ", result))
            .catch((error) => console.error(error));
        
    </script>
</body>
