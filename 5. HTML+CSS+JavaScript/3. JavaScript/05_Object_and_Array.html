<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 객체: 키-값 쌍으로 이루어진 데이터 구조
        let student = {
            name : "김재섭",
            age : 19,
            grade : "B"
        }

        console.log(student);
        console.log(student.name);
        console.log(student["name"]);

        student.addr = "인천"; // addr라는 키를 가진 값("인천")을 추가
        console.log(student);

        student.addr = "서울"; // addr라는 키가 이미 존재하기 때문에 값 수정
        console.log(student); 

        delete student.grade // grade 키를 가진 요소 삭제
        console.log(student);


        // JSON 타입 변환
        let person = {
            name : "홍길동",
            age : 21,
            isAdmin : false
        }

        console.log("person 타입: " + typeof person);

        // JSON stringify
        // - JavaScript 객체를 JSON 문자열로 변환
        // - 백엔드에 요청을 보낼 때 주로 사용
        let person_json = JSON.stringify(person); 
        console.log(person_json);
        console.log(person);

        console.log("person_json 타입: " + typeof person_json);

        // JSON parse
        // - JSON 문자열을 JavaScript 객체로 변환
        // - 백엔드로부터 온 응답 데이터를 다룰 때 주로 사용
        let person_parse = JSON.parse(person_json);
        console.log(person_parse);

        // 객체 메서드
        let obj = {
            name : "김재섭",
            age : 19, 
            addr : "인천"
        }

        const keys = Object.keys(obj); // 객체의 모든 키를 배열로 반환
        console.log(keys);

        const values = Object.values(obj); // 객체의 모든 값을 배열로 반환
        console.log(values);

        const entries = Object.entries(obj); // 객체의 모든 키-값 쌍을 배열로 반환
        console.log(entries);

        // 배열
        // - 순서가 있는 데이터 구조
        let scores = [90, 85, 88];
        console.log(scores[1]); // 1번 인덱스의 요소에 접근

        // push()
        // - 배열의 끝에 요소 추기
        scores.push(10);
        console.log(scores);

        // pop()
        // - 마지막 요소 제거 후 제거한 값 반환
        let removeValue = scores.pop();
        console.log(removeValue);

        // forEach()
        // - 반복문을 조금 더 쉽게 사용할 수 있는 메서드
        let arr = ["a", "b", "c"];
        arr.forEach((item) => console.log(item))

        // map()
        // - 요소를 하나씩 꺼내가며 정의한 함수 실행 후 새로운 배열 반환
        // - 계산한 값을 반환할 때 사용
        let numbers = [10, 20, 30];
        let resultMap = numbers.map((value) => value += 100);
        console.log(resultMap);

        // filter()
        // - 요소를 하나씩 꺼내가며 정의한 함수 실행 후 새로운 배열 반환
        // - 조건에 충족하는 요소만 반환
        let resultFilter = numbers.filter((value) => value >= 15);
        console.log(resultFilter);

        // sort()
        // - 배열을 정렬 시켜주는 메서드
        // - a-b는 오름차순 정렬, b-a는 내림차순 정렬
        let nums = [1, 7, 3, 9, 2, 7, 4];

        let resultSort = nums.sort((a, b) => a - b);
        console.log(resultSort);

        // ---------------------------------------------------------------------------------------------------------------------------------------
        let students = [
            {
                name : "김재섭",
                age : 19
            },
            {
                name : "홍길동",
                age : 22
            },
            {
                name : "철수",
                age : 5
            }
        ]
        
        console.log(students);
        console.log(students[1].name);



    </script>
</body>
</html>
