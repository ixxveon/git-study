<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        console.log(1);

        setTimeout(() => {  
            console.log(2);
        }, 0)

        function promiseFunc() {
            return new Promise((resolve, reject) => {
                console.log(3);
                resolve();
            })
        }

        async function test() {
            console.log(4);
            await promiseFunc();
            console.log(5);
        }

        test();

        console.log(6);

    </script>
</body>
</html>
