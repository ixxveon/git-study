<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="box-class">Box 1</div>
    <div class="box-class">Box 2</div>
    <div class="box-class">Box 3</div>
    <div id="box-id">Box 4</div>

    <script>
        let box = document.getElementById("box-id");
        // 텍스트 노드 조작
        // - textContent (사용 권장)
        // - innerHTML
        // - innerText (사용 권장하지 않음)
        box.textContent = '속성 조작중';
        console.log(box);

        let boxes = document.getElementsByClassName("box-class");
        console.log(boxes);

        for(let i=0; i<boxes.length; i++) {
            console.log(boxes[i]);
        }

    </script>

    <div id="text-example">
        <strong>스트롱 태그!</strong>
        <span style="display:none">숨겨진 텍스트</span>
    </div>

    <script>
        console.log("=================================================");
        let textExample = document.getElementById('text-example');
        // 해당 노드가 가지고 있는 보든 텍스트 노드
        // - HTML 태그는 렌더링 X
        // ***** 주로 사용
        console.log("textContent");
        // 스트롱 태그!
        // 숨겨진 텍스트
        console.log(textExample.textContent);

        // 해당하는 요소의 모든 HTML 컨텐츠를 가져옴
        // - HTML 태그 렌더링 O
        console.log("innerHTML");
        // <strong>스트롱 태그!</strong>
        // <span style="display:none">숨겨진 텍스트</span>
        console.log(textExample.innerHTML);

        // 해당하는 요소의 모든 텍스트 노드
        // - HTML 태그 렌더링 X
        // - 단, CSS의 영향을 받음
        //      > display:none은 안가져오기 등
        console.log("innerText");
        // 스트롱 태그!
        console.log(textExample.innerText);

        console.log("=================================================");
    </script>

    <hr>
    <input type="text" id="test-input">
    <button onclick="testAdd()">추가</button>

    <div id="result"></div>

    <script>
        function testAdd() {
            let value = document.getElementById('test-input').value;
            let result = document.getElementById('result');

            result.innerHTML = value;
        }
    </script>

    <hr>
    <input type="text" id="userId" placeholder="아이디를 입력해주세요.">
    <button onclick="submitId()">제출</button>
    <div id="msg"></div>

    <script>
        // 아이디가 비어있거나 20자 이상이면 안내 문구 생성하기
        function submitId() {
            let userId = document.getElementById("userId").value;
            let msg = document.getElementById("msg");
            
            if(userId === "") {
                msg.style.color = 'red';
                msg.style.fontSize = '12px';
                msg.textContent = "아이디를 입력해주세요.";
            } else if(userId.length >= 20) {
                msg.style.color = 'red';
                msg.style.fontSize = '12px';
                msg.textContent = "아이디는 20자 이내로 작성해주세요.";
            } else {
                // "사용 가능한 아이디입니다."
                msg.style.color = 'blue';
                msg.style.fontSize = '12px';
                msg.textContent = "사용 가능한 아이디입니다.";
            }

        } 
    </script>
    <hr> 

    <input type="text" id="todo-input">
    <button onclick="todoFunc()">추가하기</button>
    <ul id="todo-list">
        <li>먹기</li>
    </ul>

    <script>
        function todoFunc() {
            const todoInput = document.getElementById('todo-input');
            const todoList = document.getElementById('todo-list');

            console.dir(todoInput);
            console.error("asdf");

            // 요소 생성하기
            const todoItem = document.createElement("li"); // <li></li>
            todoItem.textContent = todoInput.value; //<li>놀기</li>
            
            // ul 요소의 자식으로 추가하기
            todoList.appendChild(todoItem);

            todoInput.textContent = "a";


        }
    </script>
    <hr>

    <table border="1">
        <thead>
            <tr>
                <th>이름</th>
                <th>나이</th>
            </tr>
        </thead>
        <tbody id="tbody-id">
        </tbody>
    </table>
    
    <input type="text" id="table-name">
    <br>
    <input type="text" id="table-age">
    <button onclick="addTable()">추가하기</button>

    <script>
        function addTable() {
            // 1. 필요한 요소 가져오기
            const name = document.getElementById('table-name').value;
            const age = document.getElementById('table-age').value;
            const tbody = document.getElementById('table-id');

            // 2. 요소 추가하기
            const nameTd = document.createElement("td"); // <td></td>
            const ageTd = document.createElement("td");
            const tr = document.createElement("tr");

            // 3. 텍스트 노드 추가하기
            nameTd.textContent = name;
            ageTd.textContent = age; 

            // 4. 자식 요소로 추가하기 (DOM Tree에 이어붙이기)

            /*
                <tr>
                    <td>김재섭</td>
                    <td>19</td>
                <tr>
            */
            tr.appendChild(nameTd);
            tr.appendChild(ageTd);
            tbody.appendChild(tr);
        }
    </script>

</body>
</html>
