<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Fetch 게시판 예제</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f8;
            padding: 40px;
        }

        /* 게시판 영역 */
        .board-container {
            width: 900px;
            margin: auto;
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        /* 제목 */
        .board-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* 테이블 */
        .board-table {
            width: 100%;
            border-collapse: collapse;
        }

        .board-table th {
            background: #2f80ed;
            color: white;
            padding: 12px;
        }

        .board-table td {
            border-bottom: 1px solid #ddd;
            padding: 10px;
        }

        /* hover 효과 */
        .board-table tbody tr:hover {
            background: #f1f5ff;
        }

        /* 로딩 표시 */
        .loading {
            text-align: center;
            padding: 20px;
            font-size: 18px;
        }
    </style>

</head>

<body>
    <div class="board-container">

        <div class="board-title">
            Fetch API 게시판
        </div>

        <table class="board-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>제목</th>
                    <th>내용</th>
                </tr>
            </thead>

            <tbody id="board-body">
                <tr>
                    <td colspan="3" class="loading" id="remove-td">
                        데이터 로딩중...
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

    <script>
        // async 함수
        async function load() {
            // posts 요청하여 생성
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts');
                const posts = await response.json();
                console.log(posts);
                
                const tbd = document.getElementById('board-body');
                tbd.innerHTML = "";
                
                posts.forEach((post) => {
                    const tr = document.createElement('tr'); // <tr></tr>
                    
                    const td1 = document.createElement('td'); // <td></td>
                    const td2 = document.createElement('td');
                    const td3 = document.createElement('td');
                    
                    td1.textContent = post.id;
                    td2.textContent = post.title;
                    td3.textContent = post.body;
    
                    tr.appendChild(td1);
                    tr.appendChild(td2);
                    tr.appendChild(td3);
                    tbd.appendChild(tr);
    
    
                })
            } catch(error) {

            }
            
        }

        // 페이지 로드 시 실행
        // - HTML의 DOM Tree가 완전히 다 생성되고 난 후 발생하는 이벤트
        document.addEventListener("DOMContentLoaded", () => {
            load();
        })
        
    </script>
</body>
</html>
