<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
        1. 사용자의 이름은 한글만 가능하고 2글자 이상
        2. 사용자의 이름은 비어있을 수 없음
        3. 위의 조건에 만족할 경우 "안녕하세요, 000님" alert 출력
            -> 버튼 클릭 후 2초 뒤에 출력되며 이를 promise, async/await을 사용하여 구현
        4. 만족하지 않을 경우 "유효한 이름을 입력하세요." console.error 출력
    -->

    <input type="text" id="user-id">
    <button id="btn" onclick="btnListener()">인사하기</button>
    <div id="result"></div>

    <script>
        const btn = document.getElementById('btn');
        const pattern = /^[가-힣]{2,}$/;

        // 1. promise 함수 (setTimeout 포함)
        // - 정규표현식 검사
        // - 성공 시 resolve()
        // - 실패 시 reject()
        function getUserData(userId) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if(pattern.test(userId)) {
                        resolve(userId);
                    } else {
                        reject("유효한 이름을 입력하세요.");
                    }
                }, 2000)
            })
        }

        // 2. async 함수 (await 프로미스 함수를 호출)
        async function fetchData() {
            const userId = document.getElementById('user-id').value;
            try {
                const user = await getUserData(userId); // 이 함수의 성공을 기다림
                alert("안녕하세요, " + user + "님");
            } catch(error) {
                console.error(error);
            }
        }

        function btnListener() {
            fetchData();
        }
    </script>
</body>
</html>
