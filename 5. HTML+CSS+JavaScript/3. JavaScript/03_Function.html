    <button onClick="add(10, 10)">10 + 10</button>
    <script>
        function add(num1, num2) {
            alert(num1 + num2);

    </script>
    <hr>
    <button onClick="Q1()">Q1</button>
    <hr>
    <!-- 국어, 영어, 수학 점수를 입력받아 평균을 계산하여 출력하세요. -->
    <button onClick="Q2()">Q2</button>
    <hr>

    <!-- 나이를 입력받아 19세 이상이면 "성인" 19세 미만이면 "미성년자"를 출력하세요. -->
    <button onClick="Q3()">Q3</button>
    <hr>

    <!-- 두 개의 숫자를 입력받아 더 큰 숫자를 출력하세요. -->
    <button onClick="Q4()">Q4</button>
    <hr>

    <!-- 숫자 1개를 입력받아 짝수인지 홀수인지 출력하세요. -->
    <button onClick="Q5()">Q5</button>
    <hr>

    <!-- 사용자가 입력한 구구단을 출력하세요. (ex. 2 입력하면 2단 출력) -->
    <button onClick="Q6()">Q6</button>
    <hr>

    <!-- 숫자 1개를 입력받아 1부터 N까지의 합을 계산하고 출력하세요. -->
    <button onClick="Q7()">Q7</button>
    <hr>

    <!-- 
        사용자로부터 이름을 입력받아 Alice일 경우 "다시 돌아오신걸 환영합니다" 출력
        bob일 경우 "안녕히가세요!" 출력
        그 외에는 "[이름]님 어서오세요!" 출력
    -->
    <button onClick="Q8() ">Q8</button>

    <!-- 
        1. 사용자 입력 받는 건 prompt() 사용
        2. 버튼 클릭하면 함수 호출
            ex) onClick="Q1()""
    -->

    <script>
        function Q1() {
            let birthYear = parseInt(prompt("출생연도 입력: "));
            let age = 2026 - birthYear;

            alert("당신의 나이는 " + age + "세 입니다.");
        }
        function Q2() {
            let sub1 = parseInt(prompt("국어 점수: "));
            let sub2 = parseInt(prompt("영어 점수: "));
            let sub3 = parseInt(prompt("수학 점수: "));
            let avg = (sub1 + sub2 + sub3) / 3;

            alert("과목 평균은: " + avg + "입니다.");
        }
        function Q3() {
            let age = parseInt(prompt("나이 입력: "));

            if (age>=19) {
                alert("성인");
            } else {
                alert("미성년자");
            }
        }
        function Q4() {
            let num1 = parseInt(prompt("숫자1: "));
            let num2 = parseInt(prompt("숫자2: "));
            
            if(num1>num2) {
                alert(num1);
            } else {
                alert(num2);
            }
        }
        function Q5() {
            let num1 = parseInt(prompt("숫자 입력(홀/짝): "));
            
            if(num1%2===0) {
                alert("짝수");
            } else {
                alert("홀수");
            }
        }
        function Q6() {
            let gugudan = parseInt(prompt("구구단 입력: "));

            for(let i=1; i<10; i++) {
                alert(gugudan + " * " + i + " = " + (gugudan*i));
            }

        }
        function Q7() {
            let num = parseInt(prompt("숫자 입력 (합계): "));
            let sum = 0;
            for(let i=1; i<=num; i++) {
                sum += i;
            }
            alert("숫자 합은: " + sum);
        }
        function Q8() {
            let name = prompt("이름 입력: ");
            if(name==="Alice") {
                alert("다시 돌아오신걸 환영합니다.");
            } else if(name==="bob") {
                alert("안녕히가세요!");
            } else {
                alert(name + "님 어서오세요!");
            }
        }
    </script>

    <!-- ---------------------------------------------------------------------------------------------------------------------------------------------------- -->
    <hr>

    <script>
        // 1. 일반 함수
        // - 가장 일반적으로 사용되는 함수
        // - 호이스팅 가능
        func1("hi");
        function func1(str) {
            console.log(str);
        }

        // 2. 익명 함수
        // - 이름이 없는 함수
        // - 자주 쓰이는 곳: 이벤트 처리, 콜백, 클로저, ...
        const func2 = function(str) {
            console.log(str);
        }

        // 3. 화살표 함수
        // - 코드의 라인을 줄이기 위해 사용
        // - this 바인딩 방식과 객체 생성, 구조 등이 일반 함수와 다름
        const func3 = (num1, num2) => num1 + num2;

        // - 매개변수 1개일 때: 소괄호 생략 가능
        const square = num1 => num1 *  num1;

        // - 매개변수 없을 때: 비어있는 소괄호만 작성 
        const printHello = () => "Hello";
        console.log(printHello);
        console.log(printHello());
        console.log(typeof printHello);

        // - 여러 줄 작성할 때: 중괄호 사용
        const add1 = (num1, num2) => {
            let result = num1 + num2;
            return result;
        }

        // 4. 생성자 함수
        // - 객체를 생성하여 재사용하기 위해 사용
        // - 관례적으로 생성자 함수는 앞 글자를 대문자로 표시
        function Person(name, age) {
            this.name = name;
            this.age = age;
            this.walk = function() {
                console.log(this.name + " 걷는 중");
            }
        }

        const p1 = new Person("김재섭", 19);
        const p2 = new Person("홍길동", 22);

        console.log(p1);
        console.log(p2);

        console.log(p1.name);
        p1.walk();

        // 5. 내부함수와 재귀함수
        // - 내부 함수: 함수 안에 또 다시 정의된 함수
        // - 재귀 함수: 자기 자신을 호출하는 함수

        // 내부 함수
        function outer() {
            let x = 10;

            function inner() {
                console.log(x);
            }

            inner();
        }

        outer();

        // 재귀 함수
        function countdown(cnt) {
            if(cnt === 0) {
                console.log("0이 되었습니다.");
            } else {
                console.log(cnt);
                countdown(cnt-1); // 재귀 호출
            }
        } 

        // 6. 콜백 함수
        // - 매개변수에 함수가 들어오는 방식
        function first(callback) {
            console.log("First");

            if(typeof callback === "function") {
                callback();
            }
        }

        // 함수를 호출할 때 인자로 함수를 전달
        first(function() { 
            console.log("Second");
        })

        
        
        function processUser(name, callback) {
            console.log("--- 요청 시작 ---");
            // console.log(name + "님 어서오세요.");
            callback(name);
            console.log("--- 요청 종료 ---");
        }

        // 1) 개발자 A는 "000님 환영합니다." 출력
        processUser("김재섭", function(name) {
            console.log(name + "님 환영합니다.");
        })
        
        // 2) 개발자 B는 "000님이 로그인하셨습니다." 출력
        // - 함수 미리 만들고 전달하기
        function developerB(name) {
            console.log(name + "님이 로그인하셨습니다.");
        }

        processUser("홍길동", developerB);
        
        // 3) 개발자 C는 "접속 완료!" 츨력
        processUser("철수", (name) => {
            console.log("접속 완료!");
        })


        
        function calc(a, b, operation) {
            return operation(a, b);
        }

        // 1) 더하는 기능을 가진 함수
        // - ex) 3 + 4
        calc(3, 4, function(a, b) {
            console.log(a + b);
        })

        // 2) 곱하는 기능을 가진 함수
        // - ex) 10 * 6
        calc(10, 6, function(a, b) {
            console.log(a * b);
        })

        

        

    </script>
