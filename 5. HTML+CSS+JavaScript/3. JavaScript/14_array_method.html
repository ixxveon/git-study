<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let scores = [84, 56, 78, 90, 45];

        // scores 배열에서 각각의 요소에 2를 곱한 리스트 반환
        let doubledScores = scores.map((score) => scores * 2);

        // scores 배열에서 70점을 초과하는 요소만 리스트 반환
        let passscores = scores.filter((score) => score > 70);

        // scores 배열에서 모든 점수의 합계 반환
        let sumScore = scores.reduce((total, score) => total + score, 0);

        let students = [
            {
                name : "김재섭",
                score : 70
            },
            {
                name : "짱구",
                score : 5
            },
            {
                name : "철수",
                score : 97
            }
        ]

        let topStudents = students.filter((student) => student.score >= 70);
        console.log(topStudents);

        // students 배열에서 성적의 합계 구하기 (reduce)
        let sum = students.reduce((total, student) => total + student.score, 0);
        console.log(sum);
        
        // students 배열에서 각각의 요소(score)에 5점 추가하여 반환 (map)
        let plus = students.map((student) => student.score + 5);
        console.log(plus);                                                                                                                          
    </script>
</body>
</html>
