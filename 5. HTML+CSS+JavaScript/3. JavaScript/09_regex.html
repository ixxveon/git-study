<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
        <정규 표현식>
        특정 패턴의 문자열을 찾기 위한 표현식

        <문자 패턴>
        a-z: 영어 알파벳 소문자
        A-Z: 영어 알파벳 대문자
        ㄱ-ㅎ: 한글
        가-힣: 한글
        0-9: 숫자
        \d: 숫자
        .: 임의의 문자 하나
        \w: 영어, 숫자, 언더스코어(_)

        <검색 패턴>
        []: 문자 하나(포함)
            ex) [a-z] 알파벳 소문자 하나
                [A-Z0-9] 알파벳 대문자 또는 숫자 하나
        [^]: 문자 하나(제외)
            ex) [^0-9] 숫자 제외
                [^a-d] 알파벳 소문자 a, b, c, d 제외
        ^문자열: 시작하는 문자열
            ex) ^dog dog로 시작하는 문자열
        문자열$: 끝나는 문자열
            ex) dog$ dog로 끝나는 문자열
        
        <수량 패턴>
        ?: 있거나 없음 (0번 또는 1번)
        *: 있거나 없음 (0번 이상)
        +: 최소 한개 이상 (1번 이상)
        {n}: n번
        {min, }: min번 이상
        {min, max}: min번 이상, max번 이하
    -->

    <!-- 
        정규식.test(비교할문자열): 정규식 패턴에 일치하면 true, 일치하지 않으면 false
    -->

    <script>
        let regExp = /[a-z]/;

        console.log(regExp.test("ABCD"));
        console.log(regExp.test("abcd"));

        regExp = /[A-Z][A-Z][0-9][A-Z]/;
        console.log(regExp.test("AB8E"));

        regExp = /^[a-z]/; // 시작 문자가 알파벳 소문자여야 함
        console.log(regExp.test("Aaaaaaaaa"));

        regExp = /^[가-힣][0-9]+$/;
        // 1. 시작 문자열은 무조건 한글 ^[가-힣]
        // 2. 숫자가 하나 이상 무조건 존재 [0-9]+
        // 3. 숫자로 끝나야 함 [0-9]$
        console.log(regExp.test("나0"));
        console.log(regExp.test("가나다라"));
        console.log(regExp.test("가나다라5")); // false 한글 한글자 + 숫자 한글자

    </script>

    <!-- 
        사용자 아이디 유효성 검사
            - 아이디는 영어(대/소문자), 숫자만 사용 가능
            - 5자 이상 12자 이하만 가능
    -->

    <input type="text" id="user-id" oninput="validateId()" placeholder="아이디를 입력하세요.">
    <div id="user-id-msg"></div>

    <script>
        function validateId() {
            const userId = document.getElementById('user-id').value;
            const userIdMsg = document.getElementById('user-id-msg');
            const pattern = /^[a-zA-Z0-9]{5,12}$/;

            if(pattern.test(userId)) {
                userIdMsg.textContent = '사용 가능한 아이디입니다.';
                userIdMsg.style.color = 'blue';
                userIdMsg.style.fontSize = '12px';
            } else if(userId === "") {
                userIdMsg.textContent = "";
            }
            
            else {
                userIdMsg.textContent = '사용 불가능한 아이디입니다.';
                userIdMsg.style.color = 'red';
                userIdMsg.style.fontSize = '12px';
            }
        }
    </script>

    <!-- 
        비밀번호 유효성 검사
            - 영어(대/소문자)를 무조건 포함
            - 숫자 무조건 포함
            - 특수문자 !@#$ 무조건 포함
            - 8자 이상 30자 이하
    -->

    <input type="password" id="user-password" oninput="validatePassword()">
    <div id="user-password-msg"></div>

    <script>
        function validatePassword() {
            const userPassword = document.getElementById('user-password').value;
            const userPasswordMsg = document.getElementById('user-password-msg');
            const pattern = /^(?=.*[A-Za-z])(?=.*[0-9])(?=.*[!@#$])[A-Za-z0-9!@#$]{8,30}$ /;
            // 전방 탐색: (?= )
            // - 앞에서부터 문자열을 탐색하는 패턴
            // - .* 임의의 문자(.)가 0개 이상(*)

            if(userPassword === "") {
                userPasswordMsg.textContent = "";
            } else if(pattern.test(userPassword)) {
                userPasswordMsg.textContent = "사용 가능한 비밀번호입니다.";
                userPasswordMsg.style.color = "blue";
                userPasswordMsg.style.fontSize = "12px";
            } else {
                userPasswordMsg.textContent = "사용 불가능한 비밀번호입니다.";
                userPasswordMsg.style.color = "red";
                userPasswordMsg.style.fontSize = "12px";
            }
        }   
    </script>

    <input type="email" id="user-email" oninput="validateEmail()">
    <div id="email-msg"></div>

    <script>
        function validateEmail() {
            const userEmail = document.getElementById('user-email').value;
            const emailMsg = document.getElementById('email-msg');

            const pattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
            // 1. ^[^\s@]+
            // - 공백 문자(\s)와 @를 제외하고 나머지 문자 1개 이상(+)으로 시작(^)
            // 2. @
            // - 이메일에 들어가는 @를 의미 (ex. test@naver.com)
            // 3. [^\s@]+
            // - 공백 문자(\s)와 @를 제외하고 나머지 문자 1개 이상(+)
            // - 도메인 주소가 되는 부분
            // 4. \.
            // - 문자 마침표를 의미
            // - 앞에 역슬레시가 붙으면서 원래 가지고 있던 기능을 없애고 문자로 인식
            // 5. [^\s@]{2,}$
            // - 공백 문자(\s)와 @를 제외하고 2자 이상({2,})으로 끝남($)

            if(userEmail === "") {
                emailMsg.textContent = "";
            } else if(pattern.test(userEmail)) {
                emailMsg.textContent = "사용 가능한 이메일입니다.";
                emailMsg.style.color = "blue";
                emailMsg.style.fontSize = "12px";
            } else {
                emailMsg.textContent = "사용 불가능한 이메일입니다.";
                emailMsg.style.color = "red";
                emailMsg.style.fontSize = "12px";
            }
        }
    </script>
</body>
</html>
