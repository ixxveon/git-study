# 쿠버네티스 API 버전
apiVersion: v1

# 리소스 정의 (Pod를 사용하겠다)
kind: Pod

# Pos의 이름
metadata:
  name: nginx-pod
  labels:
    app: nginx

# Pod의 스펙
spec:
  containers:
    - name: nginx # 컨테이너 이름
      image: nginx:latest # 이미지 (latest는 최신 버전을 의미)
      ports:
        - containerPort: 80 # 컨테이너의 포트
    - name: tomcat
      image: tomcat:latest
      ports:
        - containerPort: 8080