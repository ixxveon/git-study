#  - 서비스의 이름은 nginx-final-service
#   - NodePort 사용
#   - nginx-final 이라는 label을 가진 파드 추적
#   - 30002 포트로 받은 요청을 nginx-final(80 port)로 접근
apiVersion: v1
kind: Service
metadata:
  name: nginx-final-service

spec:
  type: NodePort
  selector:
    app: nginx
  ports:
    - port: 80 
      targetPort: 80 
      nodePort: 30080 