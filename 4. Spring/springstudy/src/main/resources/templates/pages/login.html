<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — MeetHub</title>
  <meta name="description" content="MeetHub에 로그인하여 취미 모임에 참여하세요.">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

 <div th:replace="~{fragments/header :: header}"></div>

  <main class="login-page">
    <div class="login-card">
      <div style="text-align:center;margin-bottom:var(--sp-4);">
        <a href="/home.html" class="site-logo" style="justify-content:center;" aria-label="MeetHub 홈으로">
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="2"/><circle cx="10" cy="12" r="2.5" fill="currentColor"/><circle cx="18" cy="12" r="2.5" fill="currentColor"/><path d="M9 18c0 0 2.5 3 5 3s5-3 5-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          MeetHub
        </a>
      </div>
      <h1 class="login-card-title">로그인</h1>
      <p class="login-card-desc">MeetHub에 오신 것을 환영합니다.</p>

      <!-- 서버 에러 영역 -->
      <!-- TH:IF(loginError) -->
      <div class="alert alert--error" style="margin-bottom:var(--sp-4);display:none;" role="alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span class="alert-content"><!-- TH:TEXT(loginError) -->이메일 또는 비밀번호가 올바르지 않습니다.</span>
        <button type="button" class="btn-dismiss" data-action="dismiss" aria-label="알림 닫기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- TH:FIELD(action) -->
      <form action="#" method="post" class="form-stack" data-validate="form" aria-label="로그인 폼">

        <!-- 이메일 / 아이디 -->
        <div class="form-group" data-rules="required,email">
          <label class="form-label" for="email">이메일 <span class="required" aria-label="필수">*</span></label>
          <!-- TH:FIELD(email) -->
          <input type="email" id="email" name="email" class="form-input" placeholder="example@meethub.kr" autocomplete="email">
          <span class="form-error" role="alert"></span>
        </div>

        <!-- 비밀번호 -->
        <div class="form-group" data-rules="required,min:8">
          <label class="form-label" for="password">비밀번호 <span class="required" aria-label="필수">*</span></label>
          <div class="input-password-wrap">
            <!-- TH:FIELD(password) -->
            <input type="password" id="password" name="password" class="form-input" placeholder="8자 이상 입력하세요" autocomplete="current-password">
            <button type="button" class="btn-toggle-pw" data-action="toggle-password" aria-label="비밀번호 보기">
              <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <span class="form-error" role="alert"></span>
        </div>

        <!-- 로그인 버튼 -->
        <button type="submit" class="btn btn--primary btn--lg" style="width:100%;">로그인</button>

      </form>

      <div class="login-footer">
        아직 회원이 아니신가요? <a href="/user/signup/form">회원가입</a>
      </div>
    </div>
  </main>

  <!-- 이 페이지는 푸터를 의도적으로 최소화 -->
  <footer style="text-align:center;padding:var(--sp-4);font-size:var(--fs-xs);color:var(--color-text-tertiary);" role="contentinfo">
    &copy; 2026 MeetHub. All rights reserved.
  </footer>

  <script src="/static/js/app.js"></script>
</body>
</html>
